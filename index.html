<!DOCTYPE html>
<html>
<head>
    <title>Persigue al Monstrito</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #gameArea {
            position: relative;
            width: 800px;
            height: 500px;
            border: 2px solid black;
            margin: auto;
            overflow: hidden;
        }
       
            #dino {
                width: 50px;
                height: 50px;
                background-image: url('dino.png');
                background-size: cover;
            }

    </style>
</head>
<body>
    <h1>¡Intenta atrapar al Noe!</h1>
    <p>Mueve el mouse sobre el área de juego y trata de hacer clic en el Monstrito. Tienes 5 intentos.</p>
    <div id="gameArea">
        <div id="dino"></div>
    </div>
    <script>
        const dino = document.getElementById("dino");
        const gameArea = document.getElementById("gameArea");
        let attempts = 5;

        function getRandomPosition() {
            let x = Math.floor(Math.random() * (gameArea.clientWidth - dino.clientWidth));
            let y = Math.floor(Math.random() * (gameArea.clientHeight - dino.clientHeight));
            return { x, y };
        }

        function moveDino() {
            let position = getRandomPosition();
            dino.style.left = position.x + "px";
            dino.style.top = position.y + "px";
        }

        dino.addEventListener("mouseover", moveDino);
        dino.addEventListener("click", () => {
            alert("¡Ganaste! Atrapaste al Monstrito.");
            location.reload();
        });

        gameArea.addEventListener("click", () => {
            attempts--;
            if (attempts <= 0) {
                alert("¡Perdedor! No atrapaste al Noe.");
                location.reload();
            }
        });

        moveDino();
    </script>
</body>
</html>
